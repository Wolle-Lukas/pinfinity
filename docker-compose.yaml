services:
  pinfinity:
    container_name: pinfinity
    # Pull the pre-built image from GitHub Container Registry.
    # To build locally instead (e.g. during development), replace this line with:
    #   build: .
    #   image: pinfinity:latest
    image: ghcr.io/wolle-lukas/pinfinity:latest
    environment:
      PINFINITY_NAME: "XXX"
      PINFINITY_EMAIL: "XXX"
      PINFINITY_DEVICE_ID: "XXX"
      PINFINITY_DEVICE_NAME: "XXX"
      PINFINITY_SERIAL_NUMBER: "XXX"
      LOG_LEVEL: "DEBUG"
    restart: always
    networks:
      - web
    volumes:
      - ./pinfinity:/app/app/data

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    networks:
      - web
    depends_on:
      - pinfinity
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

networks:
  web:
    driver: bridge
    
